                siteId:
                  type: string
                  format: uuid
                siteUrl:
                  type: string
                  format: uri
                pageUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Inspection result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: GSC not connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'

  /portfolio:
    get:
      operationId: getPortfolioSummary
      summary: Get portfolio summary
      description: Returns aggregated metrics across all clients in workspace.
      tags: [Portfolio]
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Portfolio summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/PortfolioSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /portfolio/trends:
    get:
      operationId: getPortfolioTrends
      summary: Get portfolio trends
      description: Returns time-series data for portfolio metrics.
      tags: [Portfolio]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Portfolio trends
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        clicks:
                          type: integer
                        impressions:
                          type: integer
                        avgPosition:
                          type: number
                          format: float
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /portfolio/top-clients:
    get:
      operationId: getTopClients
      summary: Get top performing clients
      description: Returns clients sorted by performance.
      tags: [Portfolio]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Top clients
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientPerformance'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /export/csv:
    post:
      operationId: exportCsv
      summary: Export data to CSV
      description: |
        Generates a CSV download for queries or pages data.
        Uses export rate limit (10 req/hour).
      tags: [Export]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment filename
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /export/sheets:
    post:
      operationId: exportSheets
      summary: Export data to Google Sheets
      description: |
        Creates a new Google Sheet with analytics data.
        Requires X-Google-OAuth-Token header.
        Uses export rate limit (10 req/hour).
      tags: [Export]
      parameters:
        - name: X-Google-OAuth-Token
          in: header
          required: true
          schema:
            type: string
          description: Google OAuth token for Sheets API
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/ExportRequest'
                - type: object
                  properties:
                    title:
                      type: string
                      description: Custom spreadsheet title
      responses:
        '200':
          description: Spreadsheet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/SheetsExportResult'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: OAuth token required or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /sync-health:
    get:
      operationId: getSyncHealth
      summary: Get sync health status
      description: |
        Returns queue stats, last sync info, recent errors, and DLQ status.
        For monitoring and debugging sync issues.
      tags: [System]
      responses:
        '200':
          description: Sync health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/SyncHealthStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /refresh:
    post:
      operationId: triggerRefresh
      summary: Trigger manual data refresh
      description: |
        Queues a manual refresh of analytics data for a site.
        Rate limited to 5 refreshes per hour per site.
      tags: [System]
      security:
        - sessionAuth: []
          workspaceHeader: []
          csrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteId]
              properties:
                siteId:
                  type: string
                  format: uuid
                types:
                  type: array
                  items:
                    type: string
                    enum:
                      - dashboard
                      - trends
                      - striking
                      - cannibalization
                      - clusters
                      - groups
                      - portfolio
                      - ctr-benchmark
                      - index-coverage
                  description: Specific types to refresh (default all)
      responses:
        '200':
          description: Refresh job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      jobId:
                        type: string
                      estimatedTime:
                        type: integer
                        description: Estimated seconds to completion
                      queuePosition:
                        type: integer
                      message:
                        type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /visibility/{clientId}:
    get:
      operationId: getVisibility
      summary: Get client visibility config
      description: Returns portal visibility settings for a client.
      tags: [Portfolio]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Visibility config
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/VisibilityConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

    put:
      operationId: updateVisibility
      summary: Update client visibility config
      description: Updates portal visibility settings for a client.
      tags: [Portfolio]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisibilityConfig'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/VisibilityConfig'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /ctr-benchmark/{clientId}:
    get:
      operationId: getCtrBenchmark
      summary: Get CTR benchmark comparison
      description: |
        Returns CTR comparison against industry benchmarks for
        a client's pages by position.
      tags: [Portfolio]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: CTR benchmark data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      pages:
                        type: array
                        items:
                          type: object
                      curve:
                        type: array
                        items:
                          type: object
                          properties:
                            position:
                              type: integer
                            expectedCtr:
                              type: number
                              format: float
                      opportunities:
                        type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /branded-split/{clientId}:
    get:
      operationId: getBrandedSplit
      summary: Get branded vs non-branded split
      description: Returns keyword performance split by branded/non-branded.
      tags: [Portfolio]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Branded split data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      brandedPercent:
                        type: number
                        format: float
                      nonBrandedPercent:
                        type: number
                        format: float
                      brandTerms:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            term:
                              type: string
                            isAutoDetected:
                              type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

    post:
      operationId: addBrandTerm
      summary: Add brand term
      description: Adds a new brand term for branded/non-branded classification.
      tags: [Portfolio]
      security:
        - sessionAuth: []
          workspaceHeader: []
          csrfToken: []
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [term]
              properties:
                term:
                  type: string
      responses:
        '200':
          description: Brand term added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      term:
                        type: string
                      isAutoDetected:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
