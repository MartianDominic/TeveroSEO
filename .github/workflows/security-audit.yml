name: Security Audit
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  # SEC-02: Gitleaks secret scanning
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning commits

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional for enhanced features

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm audit --audit-level=critical

  python-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI-Writer/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install safety pip-audit
      - name: Run safety check
        run: safety check -r requirements.txt --output json > safety-report.json || true
      - name: Check for critical vulnerabilities
        run: |
          if grep -q '"severity": "critical"' safety-report.json 2>/dev/null; then
            echo "Critical vulnerabilities found in safety check"
            cat safety-report.json
            exit 1
          fi
      - name: Run pip-audit
        run: pip-audit -r requirements.txt --strict
