# deploy-phase4.yml — Phase 4 deployment via GitHub Container Registry
#
# Alternative deployment strategy: build image in CI, push to GHCR, pull on VPS.
# This reduces build time on the VPS and enables image versioning/rollback.
#
# REQUIRED GitHub Actions repository secrets:
#   VPS_HOST              — IP or hostname of the VPS
#   VPS_USER              — dedicated Linux user "deploy" (docker group member)
#   VPS_SSH_PRIVATE_KEY   — ed25519 PRIVATE key
#   KNOWN_HOSTS           — output of `ssh-keyscan -H <VPS_HOST>`
#
# GHCR authentication uses the built-in GITHUB_TOKEN — no additional secrets needed.
# The VPS must be logged into GHCR: `docker login ghcr.io -u <user> -p <PAT>`

name: deploy-phase4

on:
  push:
    branches: [main]
    paths:
      - "open-seo-main/**"
      - "docker-compose.vps.yml"
      - ".github/workflows/deploy-phase4.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-phase4
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/open-seo
  VPS_REPO_PATH: /home/deploy/TeveroSEO
  COMPOSE_FILE: docker-compose.vps.yml

jobs:
  build-and-push:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./open-seo-main
          file: ./open-seo-main/Dockerfile.vps
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10

    steps:
      - name: Configure SSH client with pinned host key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"
          printf '%s\n' "$SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Deploy via docker compose pull + up
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o BatchMode=yes -o ConnectTimeout=30"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd "${VPS_REPO_PATH:-/home/deploy/TeveroSEO}"

          echo "[deploy-phase4] git pull origin main"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          echo "[deploy-phase4] pulling latest images from GHCR"
          docker compose -f docker-compose.vps.yml pull open-seo

          echo "[deploy-phase4] running migrations"
          docker compose -f docker-compose.vps.yml --profile migrate run --rm open-seo-migrate

          echo "[deploy-phase4] starting services"
          docker compose -f docker-compose.vps.yml up -d open-seo open-seo-worker

          echo "[deploy-phase4] pruning old images"
          docker image prune -f

          echo "[deploy-phase4] complete"
          REMOTE

  health-check:
    name: Verify deployment health
    runs-on: ubuntu-latest
    needs: deploy
    timeout-minutes: 5

    steps:
      - name: Configure SSH client
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          eval "$(ssh-agent -s)"
          printf '%s\n' "$SSH_PRIVATE_KEY" | ssh-add -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Check container health status
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o BatchMode=yes -o ConnectTimeout=30"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          cd /home/deploy/TeveroSEO

          echo "[health-check] waiting for services to become healthy (max 90s)"
          for i in $(seq 1 18); do
            OPEN_SEO=$(docker inspect -f '{{.State.Health.Status}}' $(docker compose -f docker-compose.vps.yml ps -q open-seo) 2>/dev/null || echo "missing")
            WORKER=$(docker inspect -f '{{.State.Health.Status}}' $(docker compose -f docker-compose.vps.yml ps -q open-seo-worker) 2>/dev/null || echo "missing")
            echo "[health-check] attempt $i/18: open-seo=$OPEN_SEO worker=$WORKER"

            if [ "$OPEN_SEO" = "healthy" ] && [ "$WORKER" = "healthy" ]; then
              echo "[health-check] all services healthy"
              exit 0
            fi
            sleep 5
          done

          echo "[health-check] FAILED - services did not become healthy in 90s"
          echo "--- open-seo logs ---"
          docker compose -f docker-compose.vps.yml logs --tail=50 open-seo
          echo "--- open-seo-worker logs ---"
          docker compose -f docker-compose.vps.yml logs --tail=50 open-seo-worker
          exit 1
          REMOTE

      - name: Verify HTTP endpoint responds
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o BatchMode=yes -o ConnectTimeout=30"

          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" bash -s <<'REMOTE'
          set -euo pipefail

          echo "[health-check] verifying /healthz endpoint"
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/healthz || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "[health-check] /healthz returned 200 OK"
            exit 0
          else
            echo "[health-check] FAILED - /healthz returned HTTP $HTTP_CODE"
            exit 1
          fi
          REMOTE
