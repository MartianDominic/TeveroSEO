name: Scraping Infrastructure Tests

on:
  push:
    paths:
      - "open-seo-main/src/server/features/scraping/**"
      - "open-seo-main/src/db/domain-scrape-learning-schema.ts"
      - ".github/workflows/test-scraping.yml"
  pull_request:
    paths:
      - "open-seo-main/src/server/features/scraping/**"
      - "open-seo-main/src/db/domain-scrape-learning-schema.ts"
      - ".github/workflows/test-scraping.yml"

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter open-seo-main test src/server/features/scraping/ --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./open-seo-main/coverage/lcov.info
          flags: scraping-unit
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_open_seo
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter open-seo-main db:push
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_open_seo

      - name: Run integration tests
        run: pnpm --filter open-seo-main test src/server/features/scraping/**/*integration* --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_open_seo
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./open-seo-main/coverage/lcov.info
          flags: scraping-integration
          token: ${{ secrets.CODECOV_TOKEN }}

  coverage-gate:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check coverage threshold
        run: echo "Coverage gate check (80% threshold enforced in codecov.yml)"
