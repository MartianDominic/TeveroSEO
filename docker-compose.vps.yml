# docker-compose.vps.yml — Unified VPS deployment for TeveroSEO
# DOCKER-02: 7 services | DOCKER-03: shared postgres | DOCKER-04: redis 512mb noeviction
# DOCKER-05: nginx domain routing with SSL | DOCKER-06: healthchecks + service_healthy deps

name: teveroseo

services:

  # ===== DATA LAYER =====

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      OPEN_SEO_DB_PASSWORD: ${OPEN_SEO_DB_PASSWORD}
      ALWRITY_DB_PASSWORD: ${ALWRITY_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - teveroseo-net
    # Intentionally no `ports:` — internal only (DOCKER-02 security posture)

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - teveroseo-net
    # Intentionally no `ports:` — internal only

  # ===== OPEN-SEO (open-seo-main) =====

  open-seo:
    build:
      context: ./open-seo-main
      dockerfile: Dockerfile.vps
    image: teveroseo/open-seo:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "postgresql://open_seo_user:${OPEN_SEO_DB_PASSWORD}@postgres:5432/open_seo"
      REDIS_URL: "redis://redis:6379"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      AUTH_MODE: ${OPEN_SEO_AUTH_MODE:-local_noauth}
      DATAFORSEO_API_KEY: ${DATAFORSEO_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - teveroseo-net

  open-seo-worker:
    image: teveroseo/open-seo:latest
    restart: unless-stopped
    # Image is built by `open-seo` service above; this service reuses the same image tag.
    command: ["node", ".output/worker-entry.mjs"]
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://open_seo_user:${OPEN_SEO_DB_PASSWORD}@postgres:5432/open_seo"
      REDIS_URL: "redis://redis:6379"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      open-seo:
        condition: service_started   # not healthy — worker can start in parallel with HTTP server
    healthcheck:
      # Worker has no HTTP surface — check redis reachability as a liveness proxy.
      test: ["CMD-SHELL", "node -e \"const r=require('ioredis');const c=new r(process.env.REDIS_URL);c.ping().then(()=>{c.disconnect();process.exit(0)}).catch(()=>process.exit(1))\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - teveroseo-net

  # ===== AI-WRITER =====

  ai-writer-backend:
    build:
      context: ./AI-Writer/backend
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: "postgresql://alwrity_user:${ALWRITY_DB_PASSWORD}@postgres:5432/alwrity"
      ALLOW_UNVERIFIED_JWT_DEV: ${ALLOW_UNVERIFIED_JWT_DEV:-false}
      DISABLE_AUTH: "false"
      DISABLE_SUBSCRIPTION: ${DISABLE_SUBSCRIPTION:-true}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ai_writer_workspace:/app/workspace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s
    networks:
      - teveroseo-net

  ai-writer-frontend:
    build:
      context: ./AI-Writer/frontend
      args:
        REACT_APP_CLERK_PUBLISHABLE_KEY: ${REACT_APP_CLERK_PUBLISHABLE_KEY}
        REACT_APP_API_BASE_URL: /api
        REACT_APP_DISABLE_SUBSCRIPTION: ${REACT_APP_DISABLE_SUBSCRIPTION:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - teveroseo-net

  # ===== EDGE =====

  nginx:
    build:
      context: ./docker/nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt_conf:/etc/letsencrypt:ro
      - letsencrypt_www:/var/www/certbot:ro
    depends_on:
      open-seo:
        condition: service_healthy
      ai-writer-frontend:
        condition: service_healthy
      ai-writer-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - teveroseo-net

volumes:
  postgres_data:
  redis_data:
  ai_writer_workspace:
  letsencrypt_conf:
  letsencrypt_www:

networks:
  teveroseo-net:
    driver: bridge
