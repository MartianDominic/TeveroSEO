# DOCKER-04: Redis config for shared BullMQ + KV workload.
# BullMQ REQUIRES maxmemory-policy noeviction (eviction can lose in-flight job data).

# Networking
bind 0.0.0.0
protected-mode no
port 6379
tcp-keepalive 300

# Memory
maxmemory 512mb
maxmemory-policy noeviction

# Persistence — RDB snapshot
save 60 1000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF disabled — RDB alone is sufficient for this workload
appendonly no

# Logging
loglevel notice
logfile ""

# Client limits
maxclients 10000
timeout 0
