# nginx.conf — Dev unified proxy (optional, for production-like routing)
# Access at http://localhost:50080

upstream tevero-web {
    server tevero-web:3000;
}

upstream open-seo {
    server open-seo:3001;
}

upstream ai-writer-backend {
    server ai-writer-backend:8000;
}

upstream ai-writer-frontend {
    server ai-writer-frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Main app (Next.js unified shell)
    location / {
        proxy_pass http://tevero-web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SEO audit routes
    location /seo/ {
        proxy_pass http://open-seo/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # AI-Writer API
    location /writer/api/ {
        proxy_pass http://ai-writer-backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI-Writer frontend
    location /writer/ {
        proxy_pass http://ai-writer-frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
