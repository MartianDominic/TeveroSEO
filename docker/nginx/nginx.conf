# DOCKER-05: unified reverse proxy for both platforms.
# - app.openseo.so  → open-seo:3001        (open-seo-main Node.js server)
# - app.alwrity.com → ai-writer-frontend:80 (React SPA) + /api/ → ai-writer-backend:8000
# SSL terminated here via Let's Encrypt certs mounted at /etc/letsencrypt.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    # Large uploads + long audits (open-seo Lighthouse audits can take minutes)
    client_max_body_size 50m;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ===== Internal healthcheck endpoint (no SSL required — internal use only) =====
    server {
        listen 8080;
        server_name _;

        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ===== open-seo-main (app.openseo.so) =====

    # HTTP → HTTPS redirect + ACME challenge
    server {
        listen 80;
        server_name app.openseo.so;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name app.openseo.so;

        ssl_certificate     /etc/letsencrypt/live/app.openseo.so/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.openseo.so/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass http://open-seo:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== AI-Writer (placeholder domain — replace before deploy) =====

    # HTTP → HTTPS redirect + ACME challenge
    server {
        listen 80;
        server_name app.alwrity.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name app.alwrity.com;

        ssl_certificate     /etc/letsencrypt/live/app.alwrity.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.alwrity.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # ROADMAP success criterion #3: GET /api/health → 200
        # AI-Writer backend exposes /health (not /api/health); this alias bridges the gap.
        location = /api/health {
            proxy_pass http://ai-writer-backend:8000/health;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API proxy
        location /api/ {
            proxy_pass http://ai-writer-backend:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Frontend SPA (React static served by its own nginx on :80)
        location / {
            proxy_pass http://ai-writer-frontend:80;
            proxy_set_header Host $host;
        }
    }
}
