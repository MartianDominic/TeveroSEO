# docker-compose.dev.yml — Unified LOCAL development for TeveroSEO
# Single command: make dev (or: docker compose -f docker-compose.dev.yml up --build)
#
# Port allocation (5-digit to avoid conflicts):
#   50080 - nginx unified proxy (hit this for production-like routing)
#   53000 - tevero-web (Next.js)
#   53001 - open-seo-main
#   53003 - open-seo WebSocket
#   58000 - ai-writer-backend (FastAPI)
#   58080 - ai-writer-frontend (React)
#   54320 - PostgreSQL (external access for debugging)
#   63790 - Redis (external access for debugging)

name: tevero-dev

services:

  # ===== INFRASTRUCTURE =====

  postgres:
    image: postgres:16-alpine
    container_name: tevero-dev-postgres
    ports:
      - "54320:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass123
      POSTGRES_DB: postgres
    volumes:
      - tevero-dev-pg:/var/lib/postgresql/data
      - ./docker/dev/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 15
    networks:
      - tevero-dev-net

  redis:
    image: redis:7-alpine
    container_name: tevero-dev-redis
    ports:
      - "63790:6379"
    volumes:
      - tevero-dev-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15
    networks:
      - tevero-dev-net

  # ===== OPEN-SEO-MAIN (TanStack Start) =====

  open-seo:
    build:
      context: ./open-seo-main
      dockerfile: ../docker/dev/Dockerfile.open-seo
    container_name: tevero-dev-open-seo
    ports:
      - "53001:3001"
      - "53003:3003"
    volumes:
      # Mount source for hot-reload
      - ./open-seo-main/src:/app/src:cached
      - ./open-seo-main/app:/app/app:cached
      - ./open-seo-main/drizzle:/app/drizzle:cached
      # Exclude node_modules (use container's)
      - open-seo-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "3001"
      WS_PORT: "3003"
      AUTH_MODE: local_noauth
      DATABASE_URL: postgres://postgres:devpass123@postgres:5432/open_seo
      ALWRITY_DATABASE_URL: postgres://postgres:devpass123@postgres:5432/alwrity
      REDIS_URL: redis://redis:6379
      # Placeholders (features degrade gracefully without these)
      CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      INTERNAL_API_KEY: dev-internal-key-minimum-32-characters
      IP_SALT: dev-ip-salt-for-local-development-only
      SITE_ENCRYPTION_KEY: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
      PERSONAL_CODE_SALT: dev-personal-code-salt-local-only
      AI_WRITER_URL: http://ai-writer-backend:8000
      APP_URL: http://localhost:53001
      EMBEDDING_SERVER_URL: http://embedding-server:8001
      # Optional: set these to enable full functionality
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DATAFORSEO_API_KEY: ${DATAFORSEO_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tevero-dev-net

  # ===== AI-WRITER BACKEND (FastAPI) =====

  ai-writer-backend:
    build:
      context: ./AI-Writer/backend
      dockerfile: Dockerfile
    container_name: tevero-dev-ai-writer-backend
    ports:
      - "58000:8000"
    volumes:
      # Mount app code for hot-reload
      - ./AI-Writer/backend/app:/app/app:cached
      - ai-writer-workspace:/app/workspace
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      ENVIRONMENT: development
      DATABASE_URL: postgresql://postgres:devpass123@postgres:5432/alwrity
      REDIS_URL: redis://redis:6379
      ALLOW_UNVERIFIED_JWT_DEV: "true"
      DISABLE_AUTH: "true"
      DISABLE_SUBSCRIPTION: "true"
      INTERNAL_API_KEY: dev-internal-key-minimum-32-characters
      OPEN_SEO_URL: http://open-seo:3001
      # Generate a dev Fernet key: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      FERNET_KEY: ${FERNET_KEY:-ZmVybmV0LWRldi1rZXktZm9yLWxvY2FsLW9ubHk9}
      ASSET_SIGNING_KEY: ${ASSET_SIGNING_KEY:-dev-asset-signing-key-local-only-32ch}
      # Optional AI providers
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    # Override CMD to use uvicorn with reload for hot-reload
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tevero-dev-net

  # ===== AI-WRITER FRONTEND (React) =====

  ai-writer-frontend:
    build:
      context: ./AI-Writer/frontend
      args:
        REACT_APP_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
        REACT_APP_API_BASE_URL: http://localhost:58000
        REACT_APP_DISABLE_SUBSCRIPTION: "true"
    container_name: tevero-dev-ai-writer-frontend
    ports:
      - "58080:80"
    depends_on:
      - ai-writer-backend
    networks:
      - tevero-dev-net

  # ===== TEVERO-WEB (Next.js unified shell) =====

  tevero-web:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.web
    container_name: tevero-dev-web
    ports:
      - "53000:3000"
    volumes:
      # Mount source for hot-reload
      - ./apps/web/src:/app/apps/web/src:cached
      - ./apps/web/app:/app/apps/web/app:cached
      - ./apps/web/components:/app/apps/web/components:cached
      - ./apps/web/lib:/app/apps/web/lib:cached
      - ./packages:/app/packages:cached
      # Exclude node_modules
      - web-node-modules:/app/node_modules
      - web-app-node-modules:/app/apps/web/node_modules
    environment:
      NODE_ENV: development
      PORT: "3000"
      # Build-time vars are baked in, but runtime vars still work for server-side
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      NEXT_PUBLIC_OPEN_SEO_URL: http://localhost:53001
      NEXT_PUBLIC_AI_WRITER_URL: http://localhost:58000
      NEXT_PUBLIC_WS_URL: ws://localhost:53003
      # Server-side env vars
      DATABASE_URL: postgres://postgres:devpass123@postgres:5432/open_seo
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: dev-internal-key-minimum-32-characters
      AI_WRITER_URL: http://ai-writer-backend:8000
      OPEN_SEO_URL: http://open-seo:3001
      ASSET_SIGNING_KEY: dev-asset-signing-key-local-only-32ch
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      - open-seo
      - ai-writer-backend
    networks:
      - tevero-dev-net

  # ===== EMBEDDING SERVER (v5-nano for keyword intelligence) =====

  embedding-server:
    build:
      context: ./open-seo-main/src/server/services/embedding-server
      dockerfile: Dockerfile
    container_name: tevero-dev-embedding-server
    ports:
      - "58001:8001"
    environment:
      - EMBEDDING_MODEL=jinaai/jina-embeddings-v5-text-nano
      - PORT=8001
    deploy:
      resources:
        limits:
          memory: 2G  # v5-nano needs ~1GB, 2GB for safety
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - tevero-dev-net
    profiles:
      - embedding  # Optional - only start when explicitly requested

  # ===== NGINX (unified proxy - optional, for production-like testing) =====

  nginx:
    image: nginx:alpine
    container_name: tevero-dev-nginx
    ports:
      - "50080:80"
    volumes:
      - ./docker/dev/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tevero-web
      - open-seo
      - ai-writer-frontend
      - ai-writer-backend
    networks:
      - tevero-dev-net
    profiles:
      - proxy

volumes:
  tevero-dev-pg:
  tevero-dev-redis:
  open-seo-node-modules:
  web-node-modules:
  web-app-node-modules:
  ai-writer-workspace:

networks:
  tevero-dev-net:
    driver: bridge
